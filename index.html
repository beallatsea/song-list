<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="TikTokライブ リクエスト可能な歌える曲リスト">
  <title>🎵 歌える曲リスト</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <h1 class="header__title">🎵 歌える曲リスト</h1>
    <button class="theme-toggle" id="themeToggle" aria-label="ダークモード切替">🌙</button>
  </header>

  <div class="search-wrapper">
    <div class="search-container">
      <span class="search-icon" aria-hidden="true">🔍</span>
      <input
        type="search"
        id="searchInput"
        class="search-input"
        placeholder="アーティスト・曲名で検索"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        autofocus
      >
      <button class="search-clear" id="searchClear" aria-label="検索をクリア">✕</button>
    </div>
  </div>

  <main class="main">
    <div id="songList" class="song-list" role="list"></div>
    <div id="emptyState" class="empty-state hidden" role="status">
      <div class="empty-state__icon">🎤</div>
      <p id="emptyMessage">該当する曲が見つかりませんでした</p>
    </div>
    <div id="loadingState" class="empty-state" role="status">
      <p>読み込み中...</p>
    </div>
    <div id="errorState" class="empty-state hidden" role="alert">
      <div class="empty-state__icon">⚠️</div>
      <p>データの読み込みに失敗しました。<br>ローカルサーバー経由でアクセスしてください。</p>
      <p class="error-hint"><code>npx serve .</code> を実行してから<br><code>http://localhost:3000</code> を開いてください</p>
    </div>
  </main>

  <footer class="footer">
    <span id="songCount"></span>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
